# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: Hey Matter
version: "0.3.6"
slug: hey_matter
description: >-
  将 Home Assistant 的实体发布到任意 Matter 兼容控制器（Alexa、Apple Home、Google Home）的 Bridge 模拟器。
  配置项说明：app_log_level=应用日志级别；disable_log_colors=是否禁用日志颜色；mdns_network_interface=指定 mDNS 网络接口（留空则自动选择）。
url: "https://github.com/sctale/hey-matter/tree/main/hey-matter"
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_port: 0
panel_icon: mdi:bridge
panel_title: Hey Matter
startup: services
boot: auto
homeassistant_api: true
image: ghcr.io/sctale/hey-matter-addon
stage: stable
timeout: 30
map:
  - type: app_config
    read_only: false
options:
  app_log_level: info
  disable_log_colors: false
  mdns_network_interface: ""
schema:
  app_log_level: list(debug|info|warning|error)
  disable_log_colors: bool
  mdns_network_interface: str?
